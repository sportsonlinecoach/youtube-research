<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 拡散率検索</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: #333;
      --text: #f1f1f1;
      --muted: #aaa;
      --accent: #ff4444;
      --accent-dim: rgba(255,68,68,0.15);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.15);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 64px;
    }

    header {
      max-width: 900px;
      margin: 0 auto 32px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .search-bar {
      max-width: 680px;
      margin: 0 auto 12px;
      display: flex;
      gap: 8px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    .search-bar button {
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .search-bar button:hover { opacity: 0.85; }
    .search-bar button:disabled { opacity: 0.5; cursor: default; }

    .filters-note {
      max-width: 680px;
      margin: 0 auto 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    #status {
      max-width: 900px;
      margin: 0 auto 20px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 24px;
    }

    #status.error { color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #results {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #555;
    }

    .card a {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .card .thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .card .body {
      padding: 12px;
    }

    .card .title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card .channel {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 10px;
      text-decoration: none;
      display: inline-block;
    }

    .card .channel:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .card .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .stat-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 6px 8px;
    }

    .stat-label {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .viral-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--green-dim);
      border: 1px solid rgba(74,222,128,0.3);
      color: var(--green);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .card .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pub-date {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
      color: var(--text);
    }
  </style>
</head>
<body>

<header>
  <h1>YouTube 拡散率検索</h1>
  <p>再生回数 ÷ 登録者数「拡散率」の高い動画を発見する</p>
</header>

<form class="search-bar" id="searchForm">
  <input type="text" id="queryInput" placeholder="キーワードを入力…" autocomplete="off" />
  <button type="submit" id="searchBtn">検索</button>
</form>

<div class="filters-note">
  <span class="badge">再生回数 1万回以上</span>
  <span class="badge">拡散率 1.0 以上</span>
  <span class="badge">投稿日 1年以内</span>
  <span class="badge">拡散率 降順ソート</span>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
  const form = document.getElementById("searchForm");
  const input = document.getElementById("queryInput");
  const btn = document.getElementById("searchBtn");
  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");

  const CACHE_TTL_MS = 60 * 60 * 1000; // 1時間

  function cacheGet(q) {
    try {
      const raw = localStorage.getItem("yt_cache_" + q);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL_MS) {
        localStorage.removeItem("yt_cache_" + q);
        return null;
      }
      return data;
    } catch { return null; }
  }

  function cacheSet(q, data) {
    try {
      localStorage.setItem("yt_cache_" + q, JSON.stringify({ ts: Date.now(), data }));
    } catch { /* localStorage容量超過時は無視 */ }
  }

  function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
    if (n >= 10_000) return (n / 10_000).toFixed(1) + "万";
    if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
    return n.toLocaleString();
  }

  function relativeDate(iso) {
    const d = new Date(iso);
    const diff = Math.floor((Date.now() - d) / (1000 * 60 * 60 * 24));
    if (diff === 0) return "今日";
    if (diff < 7) return `${diff}日前`;
    if (diff < 30) return `${Math.floor(diff / 7)}週間前`;
    if (diff < 365) return `${Math.floor(diff / 30)}ヶ月前`;
    return `${Math.floor(diff / 365)}年前`;
  }

  function renderCard(v) {
    return `
      <div class="card">
        <a href="https://www.youtube.com/watch?v=${v.videoId}" target="_blank" rel="noopener">
          <img class="thumb" src="${v.thumbnail}" alt="${v.title}" loading="lazy" />
          <div class="body">
            <div class="title">${v.title}</div>
            <a class="channel" href="https://www.youtube.com/channel/${v.channelId}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${v.channelTitle}</a>
            <div class="stats">
              <div class="stat-item">
                <div class="stat-label">再生回数</div>
                <div class="stat-value">${fmt(v.views)}</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">登録者数</div>
                <div class="stat-value">${fmt(v.subscribers)}</div>
              </div>
            </div>
            <div class="footer">
              <span class="viral-badge">⚡ 拡散率 ${v.viralRate.toFixed(2)}</span>
              <span class="pub-date">${relativeDate(v.publishedAt)}</span>
            </div>
          </div>
        </a>
      </div>`;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;

    btn.disabled = true;
    resultsEl.innerHTML = "";
    statusEl.className = "";

    // キャッシュ確認
    const cached = cacheGet(q);
    if (cached) {
      statusEl.textContent = `${cached.length} 件ヒット（キャッシュ）`;
      resultsEl.innerHTML = cached.map(renderCard).join("");
      btn.disabled = false;
      return;
    }

    statusEl.innerHTML = `<span class="spinner"></span>検索中…`;

    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || "サーバーエラー");

      const { results = [] } = data;
      cacheSet(q, results);

      if (results.length === 0) {
        statusEl.textContent = "";
        resultsEl.innerHTML = `
          <div class="empty">
            <strong>条件に合う動画が見つかりませんでした</strong>
            別のキーワードでお試しください（再生1万回以上・拡散率1以上・1年以内）
          </div>`;
      } else {
        statusEl.textContent = `${results.length} 件ヒット（拡散率 降順）`;
        resultsEl.innerHTML = results.map(renderCard).join("");
      }
    } catch (err) {
      statusEl.className = "error";
      statusEl.textContent = `エラー: ${err.message}`;
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
